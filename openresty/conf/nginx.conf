worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging format for WAF
    log_format waf_log '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        '$request_time "$http_referer" '
                        '"$http_user_agent" '
                        'waf_action=$waf_action '
                        'waf_rule=$waf_rule';

    access_log  logs/access.log  waf_log;

    # Performance optimizations
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Lua package path configuration
    lua_package_path "./lualib/?.lua;./lualib/?/init.lua;./lua/?.lua;./lua/?/init.lua;;";
    lua_package_cpath "./lualib/?.so;./lualib/?/init.so;;";

    # Shared memory zones for rate limiting
    lua_shared_dict waf_config 1m;
    lua_shared_dict waf_cache 10m;

    # Initialize WAF: load Redis pool, global config
    init_by_lua_block {
        local ok, err = pcall(function()
            -- Load Redis connection pool
            local redis_pool = require "lib.redis_pool"
            redis_pool.init({
                host = "127.0.0.1",
                port = 6379,
                password = "",
                db = 0,
                pool_size = 100,
                keepalive_timeout = 10000,
            })

            -- Load global configuration from Redis
            local config_loader = require "lib.config_loader"
            config_loader.load()

            ngx.log(ngx.INFO, "WAF initialized successfully")
        end)

        if not ok then
            ngx.log(ngx.ERR, "Failed to initialize WAF: ", err)
        end
    }

    # Upstream backend (Go API + Frontend)
    upstream backend_server {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Main location: proxy to Go backend
        location / {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API endpoints (same backend)
        location /api/ {
            access_by_lua_file lua/access/waf_access.lua;
            
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (no WAF processing)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Captcha verification page (no WAF processing)
        location /captcha {
            root html;
            try_files /captcha.html = 404;
        }
    }

    # Log phase: async log collection
    log_by_lua_file lua/log/waf_logger.lua;
}
