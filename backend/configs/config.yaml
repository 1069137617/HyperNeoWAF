# WAF 后端服务配置文件
# 配置文件格式：YAML
# 环境变量覆盖：CONFIG_PATH 指定配置文件路径

# ==================== 服务器配置 ====================
server:
  port: 8080                              # HTTP 服务监听端口
  mode: debug                             # 运行模式: debug(调试) / release(发布) / test(测试)

# ==================== 数据库配置 ====================
database:
  host: localhost                         # PostgreSQL 数据库主机地址
  port: 5432                              # PostgreSQL 端口号
  user: waf_admin                         # 数据库用户名
  password: ${DB_PASSWORD:-changeme}      # 数据库密码（支持环境变量，默认 changeme）
  dbname: waf_db                          # 数据库名称
  sslmode: disable                        # SSL 模式: disable / allow / prefer / require / verify-ca / verify-full
  max_open_conns: 100                      # 最大打开连接数
  max_idle_conns: 10                       # 最大空闲连接数
  conn_max_lifetime: 3600                  # 连接最大生命周期（秒）

# ==================== Redis 配置 ====================
redis:
  host: localhost                         # Redis 服务器地址
  port: 6379                              # Redis 端口号
  password: ${REDIS_PASSWORD:-""}         # Redis 密码（支持环境变量，默认空）
  db: 0                                   # Redis 数据库编号（0-15）
  pool_size: 100                           # 连接池大小

# ==================== JWT 认证配置 ====================
jwt:
  # JWT 签名密钥（支持环境变量，生产环境必须使用强随机密钥）
  secret: ${JWT_SECRET:-super-secret-key-change-in-production}
  access_token_ttl: 24h                   # Access Token 有效期（24小时）
  refresh_token_ttl: 168h                 # Refresh Token 有效期（168小时 = 7天）

# ==================== 日志配置 ====================
logging:
  level: info                             # 日志级别: debug / info / warn / error
  format: json                             # 日志格式: json / text
