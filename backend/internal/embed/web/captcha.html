<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全验证 - Security Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 20px;
        }

        .captcha-container {
            background: #ffffff;
            border-radius: 8px;
            padding: 40px;
            max-width: 380px;
            width: 100%;
            border: 1px solid #e0e0e0;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            color: #333;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .header p {
            color: #999;
            font-size: 13px;
        }

        .verify-box {
            position: relative;
            width: 100%;
            height: 52px;
            background: #f7f9fa;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .verify-box:hover {
            border-color: #b3b3b3;
        }

        .verify-box.checked {
            background: #f0fff4;
            border-color: #52c41a;
        }

        .verify-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding: 0 16px;
        }

        .verify-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-wrapper {
            position: relative;
            width: 22px;
            height: 22px;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verify-box:hover .checkbox {
            border-color: #00b4dc;
        }

        .checkbox.checked {
            background: #00b4dc;
            border-color: #00b4dc;
        }

        .checkbox svg {
            width: 14px;
            height: 14px;
            fill: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.25s ease;
        }

        .checkbox.checked svg {
            opacity: 1;
            transform: scale(1);
        }

        .verify-text {
            color: #666;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: scaleIn 0.5s ease;
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .success-text {
            color: #333;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .redirect-text {
            color: #999;
            font-size: 14px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #00b4dc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="captcha-container">
        <div class="header">
            <h1>安全验证</h1>
            <p>您的IP在黑名单中，请完成验证</p>
        </div>

        <div class="verify-box" id="verifyBox" onclick="handleClick()">
            <div class="verify-content">
                <div class="verify-left">
                    <div class="checkbox-wrapper">
                        <div class="checkbox" id="checkbox">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                            </svg>
                        </div>
                    </div>
                    <span class="verify-text">确认你是人类</span>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">验证中...</div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>
        <div class="success-text">验证成功</div>
        <div class="redirect-text">正在跳转...</div>
    </div>

    <script>
        const VERIFY_TOKEN_KEY = 'waf_verify_token';
        let isVerified = false;
        let captchaToken = null;

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function getAPIBase() {
            return '';
        }

        async function init() {
            const redirectUrl = getQueryParam('redirect') || '/';
            captchaToken = getQueryParam('token');

            if (!captchaToken) {
                try {
                    const response = await fetch(getAPIBase() + '/api/v1/captcha/generate?redirect=' + encodeURIComponent(redirectUrl));
                    const data = await response.json();
                    if (data.token) {
                        captchaToken = data.token;
                    }
                    if (data.verified) {
                        isVerified = true;
                        sessionStorage.setItem(VERIFY_TOKEN_KEY, data.token);
                        showSuccess();
                    }
                } catch (e) {
                    console.error('Failed to generate captcha:', e);
                }
            } else {
                try {
                    const response = await fetch(getAPIBase() + '/api/v1/captcha/check');
                    const data = await response.json();
                    if (data.verified) {
                        isVerified = true;
                        sessionStorage.setItem(VERIFY_TOKEN_KEY, data.token);
                        handleVerifiedState();
                    }
                } catch (e) {
                    console.error('Failed to check captcha status:', e);
                }
            }
        }

        function handleVerifiedState() {
            const verifyBox = document.getElementById('verifyBox');
            const checkbox = document.getElementById('checkbox');
            verifyBox.classList.add('checked');
            checkbox.classList.add('checked');

            setTimeout(() => {
                showSuccess();
            }, 500);
        }

        async function handleClick() {
            if (isVerified) return;

            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('show');

            try {
                const response = await fetch(getAPIBase() + '/api/v1/captcha/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: captchaToken }),
                });

                const data = await response.json();

                if (data.success) {
                    isVerified = true;
                    sessionStorage.setItem(VERIFY_TOKEN_KEY, data.verify_token);

                    const verifyBox = document.getElementById('verifyBox');
                    const checkbox = document.getElementById('checkbox');
                    verifyBox.classList.add('checked');
                    checkbox.classList.add('checked');

                    loadingOverlay.classList.remove('show');

                    setTimeout(() => {
                        showSuccess();
                    }, 500);
                } else {
                    loadingOverlay.classList.remove('show');
                    alert('验证失败，请重试');
                }
            } catch (e) {
                loadingOverlay.classList.remove('show');
                console.error('Verification failed:', e);
                alert('验证失败，请重试');
            }
        }

        function showSuccess() {
            const successOverlay = document.getElementById('successOverlay');
            successOverlay.classList.add('show');

            const redirectUrl = getQueryParam('redirect') || '/';

            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1200);
        }

        init();
    </script>
</body>
</html>
